# Note: 'version' field is obsolete in modern Docker Compose, removed

services:
  # Message Queue
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: codegen-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: codegen
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-devpassword}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codegen-net

  # State Store
  redis:
    image: redis:7-alpine
    container_name: codegen-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-devpassword}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - codegen-net

  # Coordinator API
  coordinator:
    build:
      context: ./coordinator
      dockerfile: Dockerfile
    container_name: codegen-coordinator
    ports:
      - "8000:8000"
    environment:
      - RABBITMQ_URL=amqp://codegen:${RABBITMQ_PASSWORD:-devpassword}@rabbitmq:5672/
      - REDIS_URL=redis://:${REDIS_PASSWORD:-devpassword}@redis:6379/0
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OLLAMA_HOST=http://host.docker.internal:11434
      - MAX_ITERATIONS=5
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./tests:/app/tests
    networks:
      - codegen-net
    restart: unless-stopped

  # Code Writer Agent
  agent-writer:
    build:
      context: ./agents/writer
      dockerfile: Dockerfile
    container_name: codegen-agent-writer
    environment:
      - RABBITMQ_URL=amqp://codegen:${RABBITMQ_PASSWORD:-devpassword}@rabbitmq:5672/
      - REDIS_URL=redis://:${REDIS_PASSWORD:-devpassword}@redis:6379/0
      - OLLAMA_HOST=http://host.docker.internal:11434
      - MODEL_NAME=deepseek-coder:6.7b-instruct-q4_K_M
    depends_on:
      - rabbitmq
      - redis
    volumes:
      - ./logs:/app/logs
    networks:
      - codegen-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1536M

  # Verifier Agent
  agent-verifier:
    build:
      context: ./agents/verifier
      dockerfile: Dockerfile
    container_name: codegen-agent-verifier
    environment:
      - RABBITMQ_URL=amqp://codegen:${RABBITMQ_PASSWORD:-devpassword}@rabbitmq:5672/
      - REDIS_URL=redis://:${REDIS_PASSWORD:-devpassword}@redis:6379/0
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      - rabbitmq
      - redis
    volumes:
      - ./logs:/app/logs
    networks:
      - codegen-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # Tester Agent
  agent-tester:
    build:
      context: ./agents/tester
      dockerfile: Dockerfile
    container_name: codegen-agent-tester
    environment:
      - RABBITMQ_URL=amqp://codegen:${RABBITMQ_PASSWORD:-devpassword}@rabbitmq:5672/
      - REDIS_URL=redis://:${REDIS_PASSWORD:-devpassword}@redis:6379/0
      - OLLAMA_HOST=http://host.docker.internal:11434
      - MODEL_NAME=deepseek-coder:6.7b-instruct-q4_K_M
    depends_on:
      - rabbitmq
      - redis
    volumes:
      - ./logs:/app/logs
      - ./tests:/app/tests
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - codegen-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1536M

  # Improver Agent
  agent-improver:
    build:
      context: ./agents/improver
      dockerfile: Dockerfile
    container_name: codegen-agent-improver
    environment:
      - RABBITMQ_URL=amqp://codegen:${RABBITMQ_PASSWORD:-devpassword}@rabbitmq:5672/
      - REDIS_URL=redis://:${REDIS_PASSWORD:-devpassword}@redis:6379/0
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      - rabbitmq
      - redis
    volumes:
      - ./logs:/app/logs
    networks:
      - codegen-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

# Named volumes - these persist data
volumes:
  rabbitmq_data:
    driver: local
  redis_data:
    driver: local

# Network definition - MUST be at root level, not indented under services
networks:
  codegen-net:
    driver: bridge